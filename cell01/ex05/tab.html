<!DOCTYPE html>
<html>
<head>
<style>
* {
  box-sizing: border-box;
}

.box {
  float: left;
  width: 50%;
  padding: 50px;
}

.clearfix::after {
  content: "";
  clear: both;
  display: table;
}
</style>
</head>
<body>


<div class="clearfix">
  <div class="box" style="background-color:aquamarine; font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
  <p>Hello</p>
  </div>
  <div class="box" style="background-color:coral; font-family: Arial, Helvetica, sans-serif;">
  <p>World</p>
  </div>
  
</div>

</body>
</html>
