<!DOCTYPE html>
<html>
<head>
<style>
* {
  box-sizing: border-box;
}

.box {
  float: left;
  width: 50%;
  padding: 50px;
}

.clearfix::after {
  content: "";
  clear: both;
  display: table;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

table {
  width: 100vw;   
  height: 100vh;  
  border-collapse: collapse; 
  table-layout: fixed; 
}

</style>
</head>
<body>

  <table>
    <tr>
      <td style="background-color:aquamarine; font-family: Impact, sans-serif;">
        <p>Hello</p>
      </td>
      <td style="background-color:coral; font-family: Arial, Helvetica, sans-serif;">
        <p>World</p>
      </td>
    </tr>
  </table>
  
  </body>
  
</html>
